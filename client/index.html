<!DOCTYPE html>
<html>
<head>
<title>NightMind</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { background:#0f172a; color:white; text-align:center; }
.card { background:#1e293b; padding:20px; margin:10px auto; width:300px; border-radius:15px; }
button { padding:10px; margin:5px; background:#ef4444; border:none; color:white; }
</style>
</head>

<body>

<h1>🐺 NightMind</h1>

<div class="card">
<input id="name" placeholder="Name"><br><br>
<button onclick="playGuest()">🎮 Guest</button>
</div>

<div class="card">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="userInfo"></p>
</div>

<h2 id="phase">Lobby</h2>

<input id="target" placeholder="Target"><br>
<button onclick="kill()">🐺</button>
<button onclick="save()">💉</button>
<button onclick="see()">🔮</button>
<button onclick="vote()">🗳️</button>

<ul id="chat"></ul>
<input id="chatInput">
<button onclick="sendChat()">Send</button>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB9xf5ZR5MbR0Rs7T0rc2rZwtfOUn2ZqnE",
  authDomain: "nightmind-82dba.firebaseapp.com",
  projectId: "nightmind-82dba"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const socket = new WebSocket(
 (location.protocol==="https:"?"wss://":"ws://")+location.host
);

// Guest
function playGuest(){
    socket.send(JSON.stringify({
        type:"quick_play",
        name:name.value
    }));
}

// Auth
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>createUserDoc(auth.currentUser))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
userInfo.innerText="Logged in as "+user.email;
}
});

// Create user in DB
function createUserDoc(user){
db.collection("users").doc(user.uid).set({
email:user.email,
wins:0,
losses:0,
games:0
});
}

// Quick play (account)
function quickPlay(){
if(!auth.currentUser){
alert("login first");
return;
}

socket.send(JSON.stringify({
type:"quick_play",
name:auth.currentUser.email,
email:auth.currentUser.email
}));
}

// Actions
function send(type){
socket.send(JSON.stringify({
type,
target:target.value
}));
}

function kill(){send("kill");}
function save(){send("save");}
function see(){send("see");}
function vote(){send("vote");}

// Chat
function sendChat(){
socket.send(JSON.stringify({
type:"chat",
name:"You",
message:chatInput.value
}));
}

// 🔥 UPDATE STATS
socket.onmessage = async (e)=>{
const d = JSON.parse(e.data);

if(d.type==="update_stats" && auth.currentUser){

const ref = db.collection("users").doc(auth.currentUser.uid);

const doc = await ref.get();

const data = doc.data();

await ref.update({
games: data.games + 1,
wins: data.wins + (d.win ? 1 : 0),
losses: data.losses + (d.win ? 0 : 1)
});

alert("Stats updated!");
}

if(d.type==="game_over"){
alert(d.message);
}

};

</script>

</body>
</html>
