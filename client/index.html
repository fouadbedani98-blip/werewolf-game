<!DOCTYPE html>
<html>
<head>
<title>Werewolf Game</title>
</head>

<body>

<h1>🐺 Werewolf Game</h1>

<input id="name" placeholder="Your name">

<br><br>

<button onclick="createRoom()">Create Room</button>

<br><br>

<input id="roomCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h2 id="room"></h2>

<h3 id="phase">Phase: Lobby</h3>

<h3>Players</h3>
<ul id="players"></ul>

<button onclick="startGame()">Start Game</button>

<h3>Actions</h3>
<input id="target" placeholder="Target player">
<button onclick="kill()">Kill (Werewolf)</button>
<button onclick="vote()">Vote</button>

<h3>Chat</h3>
<input id="chatInput">
<button onclick="sendChat()">Send</button>

<ul id="chat"></ul>

<script>

const socket = new WebSocket(
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host
);

let playerName="";

socket.onmessage = (event) => {

const data = JSON.parse(event.data);

// دورك
if(data.type === "your_role"){
    alert("Your role is: " + data.role);
}

// الليل
if(data.type === "night_start"){
    document.getElementById("phase").innerText="Phase: Night 🌙";
}

// النهار
if(data.type === "day_start"){
    document.getElementById("phase").innerText="Phase: Day ☀️";
    alert("Player killed: " + data.dead);
}

// قتل بالتصويت
if(data.type === "player_killed"){
    alert("Executed: " + data.name);
}

// غرفة
if(data.type==="room_created" || data.type==="room_joined"){
    document.getElementById("room").innerText="Room: "+data.code;
}

// لاعبين
if(data.type==="player_list"){
    const list=document.getElementById("players");
    list.innerHTML="";
    data.players.forEach(p=>{
        const li=document.createElement("li");
        li.innerText=p;
        list.appendChild(li);
    });
}

// شات
if(data.type==="chat"){
    const chat=document.getElementById("chat");
    const li=document.createElement("li");
    li.innerText=data.name+": "+data.message;
    chat.appendChild(li);
}

};

function createRoom(){
playerName=document.getElementById("name").value;
socket.send(JSON.stringify({ type:"create_room", name:playerName }));
}

function joinRoom(){
playerName=document.getElementById("name").value;
const code=document.getElementById("roomCode").value;
socket.send(JSON.stringify({ type:"join_room", name:playerName, code:code }));
}

function startGame(){
socket.send(JSON.stringify({ type:"start_game" }));
}

function kill(){
const target=document.getElementById("target").value;
socket.send(JSON.stringify({ type:"kill", target:target }));
}

function vote(){
const target=document.getElementById("target").value;
socket.send(JSON.stringify({ type:"vote", target:target }));
}

function sendChat(){
const message=document.getElementById("chatInput").value;
socket.send(JSON.stringify({
type:"chat",
name:playerName,
message:message
}));
}

</script>

</body>
</html>
