<!DOCTYPE html>
<html>
<head>
<title>Werewolf Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐺 Werewolf Game</h1>

<input id="name" placeholder="Your name">

<br><br>

<button onclick="createRoom()">Create Room</button>

<br><br>

<input id="roomCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h2 id="room"></h2>
<h3 id="phase">Phase: Lobby</h3>

<h3>Players</h3>
<ul id="players"></ul>

<button onclick="startGame()">Start Game</button>

<h3>Actions</h3>

<input id="target" placeholder="Target name">

<br><br>

<button onclick="kill()">🐺 Kill</button>
<button onclick="save()">💉 Save</button>
<button onclick="see()">🔮 See</button>
<button onclick="vote()">🗳️ Vote</button>
<button onclick="endNight()">⏭ End Night</button>

<h3>Chat</h3>

<input id="chatInput">
<button onclick="sendChat()">Send</button>

<ul id="chat"></ul>

<script src="app.js"></script>

</body>
</html>
