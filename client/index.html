<!DOCTYPE html>
<html>
<head>
<title>Werewolf Game</title>
</head>

<body>

<h1>🐺 Werewolf Game</h1>

<input id="name" placeholder="Your name">

<br><br>

<button onclick="createRoom()">Create Room</button>

<br><br>

<input id="roomCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h2 id="room"></h2>
<h3 id="phase">Phase: Lobby</h3>

<ul id="players"></ul>

<button onclick="startGame()">Start Game</button>

<h3>Actions</h3>

<input id="target" placeholder="Target name">

<button onclick="kill()">Kill 🐺</button>
<button onclick="save()">Save 💉</button>
<button onclick="see()">See 🔮</button>
<button onclick="vote()">Vote 🗳️</button>
<button onclick="endNight()">End Night 🌙➡️☀️</button>

<h3>Chat</h3>

<input id="chatInput">
<button onclick="sendChat()">Send</button>

<ul id="chat"></ul>

<script>

const socket = new WebSocket(
  (location.protocol==="https:"?"wss://":"ws://")+location.host
);

let name="";

socket.onmessage=(e)=>{

const d=JSON.parse(e.data);

if(d.type==="your_role") alert("Role: "+d.role);

if(d.type==="night_start")
document.getElementById("phase").innerText="Night 🌙";

if(d.type==="day_start"){
document.getElementById("phase").innerText="Day ☀️";
alert("Dead: "+d.dead);
}

if(d.type==="seer_result")
alert("Role is: "+d.role);

if(d.type==="game_over")
alert(d.message);

if(d.type==="player_list"){
const list=document.getElementById("players");
list.innerHTML="";
d.players.forEach(p=>{
const li=document.createElement("li");
li.innerText=p;
list.appendChild(li);
});
}

if(d.type==="chat"){
const li=document.createElement("li");
li.innerText=d.name+": "+d.message;
document.getElementById("chat").appendChild(li);
}

if(d.type==="room_created"||d.type==="room_joined"){
document.getElementById("room").innerText="Room: "+d.code;
}

};

function createRoom(){
name=document.getElementById("name").value;
socket.send(JSON.stringify({type:"create_room",name}));
}

function joinRoom(){
name=document.getElementById("name").value;
const code=document.getElementById("roomCode").value;
socket.send(JSON.stringify({type:"join_room",name,code}));
}

function startGame(){
socket.send(JSON.stringify({type:"start_game"}));
}

function kill(){
socket.send(JSON.stringify({type:"kill",target:target.value}));
}

function save(){
socket.send(JSON.stringify({type:"save",target:target.value}));
}

function see(){
socket.send(JSON.stringify({type:"see",target:target.value}));
}

function vote(){
socket.send(JSON.stringify({type:"vote",target:target.value}));
}

function endNight(){
socket.send(JSON.stringify({type:"end_night"}));
}

function sendChat(){
socket.send(JSON.stringify({
type:"chat",
name:name,
message:chatInput.value
}));
}

</script>

</body>
</html>
