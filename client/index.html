<!DOCTYPE html>
<html>
<head>
<title>NightMind</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { background:#0f172a; color:white; text-align:center; font-family:sans-serif;}
.card { background:#1e293b; padding:20px; margin:10px auto; width:320px; border-radius:15px;}
button { padding:10px; margin:5px; background:#ef4444; border:none; color:white;}
</style>
</head>

<body>

<h1>🐺 NightMind</h1>

<div class="card">
<input id="name" placeholder="Name"><br><br>
<button onclick="playGuest()">🎮 Guest</button>
<button onclick="quickPlay()">⚡ Quick Match</button>
</div>

<div class="card">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="userInfo"></p>
</div>

<div class="card">
<h2>👤 Profile</h2>
<p id="profileEmail"></p>
<p id="profileLevel"></p>
<p id="profileRank"></p>
<p id="profileXP"></p>
</div>

<div class="card">
<h2>🏆 Leaderboard</h2>
<ul id="leaderboard"></ul>
<button onclick="loadLeaderboard()">Refresh</button>
</div>

<script>

// Firebase
const firebaseConfig = {
apiKey:"AIzaSyB9xf...",
authDomain:"nightmind-82dba.firebaseapp.com",
projectId:"nightmind-82dba"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const socket = new WebSocket(
(location.protocol==="https:"?"wss://":"ws://")+location.host
);

// XP SYSTEM
function getLevel(xp){
return Math.floor(0.1 * Math.sqrt(xp)) + 1;
}

function getRank(xp){
if(xp < 500) return "Bronze";
if(xp < 1500) return "Silver";
if(xp < 3000) return "Gold";
if(xp < 6000) return "Platinum";
if(xp < 10000) return "Diamond";
return "Master";
}

// AUTH
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>createUserDoc(auth.currentUser));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value);
}

function playGuest(){
socket.send(JSON.stringify({
type:"quick_play",
name:name.value
}));
}

function quickPlay(){
if(!auth.currentUser){ alert("login first"); return; }

socket.send(JSON.stringify({
type:"quick_play",
name:auth.currentUser.email,
email:auth.currentUser.email
}));
}

// Create user
function createUserDoc(user){
db.collection("users").doc(user.uid).set({
email:user.email,
wins:0,
losses:0,
games:0,
xp:0,
level:1,
rank:"Bronze",
joinDate:new Date()
});
}

// PROFILE UI
auth.onAuthStateChanged(async user=>{
if(user){

userInfo.innerText="Logged as "+user.email;

const doc = await db.collection("users").doc(user.uid).get();
const d = doc.data();

profileEmail.innerText="Email: "+d.email;
profileLevel.innerText="Level: "+d.level;
profileRank.innerText="Rank: "+d.rank;
profileXP.innerText="XP: "+d.xp;

loadLeaderboard();
}
});

// UPDATE STATS
socket.onmessage = async (e)=>{
const d = JSON.parse(e.data);

if(d.type==="update_stats" && auth.currentUser){

const ref = db.collection("users").doc(auth.currentUser.uid);
const doc = await ref.get();
const data = doc.data();

const xpGain = d.win ? 100 : 40;
const newXP = data.xp + xpGain;

await ref.update({
games: data.games + 1,
wins: data.wins + (d.win ? 1 : 0),
losses: data.losses + (d.win ? 0 : 1),
xp: newXP,
level: getLevel(newXP),
rank: getRank(newXP)
});

alert("XP +" + xpGain);
}
};

// Leaderboard
async function loadLeaderboard(){

leaderboard.innerHTML="Loading...";

const snap = await db.collection("users")
.orderBy("xp","desc")
.limit(10)
.get();

leaderboard.innerHTML="";

snap.forEach(doc=>{
const u = doc.data();
const li=document.createElement("li");
li.innerText = `${u.email} - ${u.xp} XP (${u.rank})`;
leaderboard.appendChild(li);
});
}

</script>

</body>
</html>
