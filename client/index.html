<!DOCTYPE html>
<html>
<head>
<title>NightMind Lobby</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
margin:15px auto;
width:350px;
border-radius:15px;
}

button{
padding:10px;
margin:5px;
background:#ef4444;
border:none;
color:white;
cursor:pointer;
}

.ready{
color:#22c55e;
}

.notready{
color:#ef4444;
}

.host{
color:gold;
}

</style>
</head>

<body>

<h1>🎮 NightMind Lobby</h1>

<div class="card">
<input id="name" placeholder="Name"><br>
<button onclick="createRoom()">Create Room</button>
</div>

<div class="card">
<input id="roomCode" placeholder="Room code">
<button onclick="joinRoom()">Join</button>
</div>

<div class="card">
<h2 id="room"></h2>

<button onclick="toggleReady()">🟢 Ready</button>
<button onclick="startGame()">▶️ Start Game</button>

<h3>Players</h3>
<ul id="players"></ul>
</div>

<script>

const socket = new WebSocket(
(location.protocol==="https:"?"wss://":"ws://")+location.host
);

let playerName="";

socket.onmessage = (e)=>{
const d = JSON.parse(e.data);

// room
if(d.type==="room_created" || d.type==="room_joined"){
room.innerText="Room: "+d.code;
}

// lobby update
if(d.type==="lobby_update"){

players.innerHTML="";

d.players.forEach(p=>{
const li=document.createElement("li");

li.innerHTML = `
${p.name}
${p.host ? " 👑" : ""}
<span class="${p.ready ? 'ready' : 'notready'}">
${p.ready ? "READY" : "NOT READY"}
</span>
`;

players.appendChild(li);
});
}

// game start
if(d.type==="game_started"){
alert("Game Started!");
}

if(d.type==="error"){
alert(d.message);
}

};

// actions
function createRoom(){
playerName=name.value;
socket.send(JSON.stringify({
type:"create_room",
name:playerName
}));
}

function joinRoom(){
playerName=name.value;
socket.send(JSON.stringify({
type:"join_room",
name:playerName,
code:roomCode.value
}));
}

function toggleReady(){
socket.send(JSON.stringify({
type:"toggle_ready"
}));
}

function startGame(){
socket.send(JSON.stringify({
type:"start_game"
}));
}

</script>

</body>
</html>
