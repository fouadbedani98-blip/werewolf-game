<!DOCTYPE html>
<html>
<head>
<title>Werewolf Pro</title>
<link rel="stylesheet" href="style.css">
<style>
#phase {
    font-size: 24px;
    transition: 0.5s;
}
.fade {
    animation: fade 0.5s;
}
@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<h1>🐺 Werewolf Pro</h1>

<input id="name" placeholder="Your name">

<br><br>

<button onclick="createRoom()">Create Room</button>

<br><br>

<input id="roomCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h2 id="room"></h2>

<h3 id="phase">Phase: Lobby</h3>
<h3 id="timer"></h3>

<h3 id="readyStatus"></h3>
<button onclick="ready()">✅ Ready</button>

<ul id="players"></ul>

<h3>Actions</h3>

<input id="target" placeholder="Target name">

<br><br>

<button onclick="kill()">🐺 Kill</button>
<button onclick="save()">💉 Save</button>
<button onclick="see()">🔮 See</button>
<button onclick="vote()">🗳️ Vote</button>

<h3>Chat</h3>

<input id="chatInput">
<button onclick="sendChat()">Send</button>

<ul id="chat"></ul>

<script src="app.js"></script>
</body>
</html>
