<!DOCTYPE html>
<html>
<head>
<title>NightMind</title>

<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
.card{background:#1e293b;padding:15px;margin:10px auto;width:340px;border-radius:10px;}
button{padding:10px;margin:5px;background:#ef4444;color:white;border:none;}
.ready{color:#22c55e;}
</style>
</head>

<body>

<h1>🐺 NightMind</h1>

<div class="card">
<input id="name" placeholder="Name"><br>
<button onclick="createRoom()">Create Room</button>
</div>

<div class="card">
<input id="roomCode" placeholder="Code">
<button onclick="joinRoom()">Join</button>
</div>

<div class="card">
<h2 id="room"></h2>

<button onclick="toggleReady()">Ready</button>
<button onclick="startGame()">Start</button>

<ul id="players"></ul>
</div>

<script>

const socket = new WebSocket(
(location.protocol==="https:"?"wss://":"ws://")+location.host
);

let playerName="";

socket.onmessage = (e)=>{
const d = JSON.parse(e.data);

if(d.type==="room_created"||d.type==="room_joined"){
room.innerText="Room: "+d.code;
}

if(d.type==="lobby_update"){
players.innerHTML="";
d.players.forEach(p=>{
const li=document.createElement("li");
li.innerText = `${p.name} ${p.ready?"✅":"❌"} ${p.host?"👑":""}`;
players.appendChild(li);
});
}

if(d.type==="game_started"){
alert("Game Started!");
}

if(d.type==="your_role"){
alert("Your role: "+d.role);
}

if(d.type==="night_start"){
console.log("Night...");
}

if(d.type==="day_start"){
alert("Dead: "+d.dead);
}

if(d.type==="game_over"){
alert("Winner: "+d.message);
}

};

function createRoom(){
playerName=name.value;
socket.send(JSON.stringify({
type:"create_room",
name:playerName
}));
}

function joinRoom(){
playerName=name.value;
socket.send(JSON.stringify({
type:"join_room",
name:playerName,
code:roomCode.value
}));
}

function toggleReady(){
socket.send(JSON.stringify({type:"toggle_ready"}));
}

function startGame(){
socket.send(JSON.stringify({type:"start_game"}));
}

</script>

</body>
</html>
