<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h1>🐺 NightMind</h1>

<input id="name" placeholder="Name">

<button onclick="guest()">Guest</button>
<button onclick="quick()">Quick Match</button>

<br><br>

<button onclick="create()">Create</button>
<input id="code" placeholder="Code">
<button onclick="join()">Join</button>

<h2 id="room"></h2>

<button onclick="ready()">Ready</button>
<button onclick="start()">Start</button>

<div id="players"></div>

<h3 id="phase">Waiting</h3>

<select id="target"></select><br>

<button onclick="kill()">Kill</button>
<button onclick="save()">Save</button>
<button onclick="see()">See</button>
<button onclick="vote()">Vote</button>

<script>
const socket=new WebSocket("ws://werewolf-game-fjed.onrender.com");

let username="",role="";

function guest(){
username=name.value||"Guest"+Math.floor(Math.random()*1000);
alert(username);
}

function create(){
socket.send(JSON.stringify({type:"create",name:username}));
}

function join(){
socket.send(JSON.stringify({type:"join",name:username,code:code.value}));
}

function quick(){
socket.send(JSON.stringify({type:"quick",name:username}));
}

function ready(){ socket.send(JSON.stringify({type:"ready"})); }
function start(){ socket.send(JSON.stringify({type:"start"})); }

function kill(){ socket.send(JSON.stringify({type:"kill",target:target.value})); }
function save(){ socket.send(JSON.stringify({type:"save",target:target.value})); }
function see(){ socket.send(JSON.stringify({type:"see",target:target.value})); }
function vote(){ socket.send(JSON.stringify({type:"vote",target:target.value})); }

socket.onmessage=e=>{
const d=JSON.parse(e.data);

if(d.type==="room") room.innerText="Room: "+d.code;

if(d.type==="lobby"){
players.innerHTML="";
target.innerHTML="";

d.players.forEach(p=>{
players.innerHTML+=p.name+" "+(p.ready?"✅":"")+"<br>";

if(p.alive){
target.innerHTML+=`<option>${p.name}</option>`;
}
});
}

if(d.type==="role"){ role=d.role; alert(role); }
if(d.type==="phase"){ phase.innerText=d.value; }
if(d.type==="night_result"){ alert("Dead: "+(d.dead||"No one")); }
if(d.type==="day_result"){ alert("Killed: "+(d.killed||"No one")); }
if(d.type==="see"){ alert("Role: "+d.role); }
if(d.type==="game_over"){ alert(d.msg); }

};
</script>

</body>
</html>
